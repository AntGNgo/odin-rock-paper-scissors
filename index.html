<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>

<body>
    <h1>Rock Paper Scissors</h1>
    <div class="game-board">
        <div class="player-side">
            <p class="player-score">You: 0</p>
            <img src="" alt="" class="player-choice">
            <div class="player-options">
                <div class="rock"><img src="./assets/rock.png" alt="rock"></div>
                <div class="paper"><img src="./assets/paper.png" alt="paper"></div>
                <div class="scissors"><img src="./assets/scissors.png" alt="scissors"></div>

            </div>
        </div>
        <div>VS.</div>
        <div class="computer-side">
            <p class="computer-score">Computer: </p>
            <img src="" alt="" class="computer-choice">
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
