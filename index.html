<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Rock Paper Scissors</h1>
    <div id="game-board">
        <div id="player-side">
            <p id="player-score">You: 0</p>
            <img src="" alt="" id="player-choice">
            <div id="player-options">
                <div id="player-rock"><img src="./assets/rock.png" alt="rock"></div>
                <div id="player-paper"><img src="./assets/paper.png" alt="paper"></div>
                <div id="player-scissors"><img src="./assets/scissors.png" alt="scissors"></div>
            </div>
        </div>
        <div id="center">
            <div id="vs">VS.</div>
            <div id="winner" class="hidden"></div>
        </div>
        <div id="computer-side">
            <p id="computer-score">Computer: 0</p>
            <img src="" alt="" id="computer-choice">
            <div id="computer-options">
                <div id="rock"><img src="./assets/rock.png" alt="rock"></div>
                <div id="paper"><img src="./assets/paper.png" alt="paper"></div>
                <div id="scissors"><img src="./assets/scissors.png" alt="scissors"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
